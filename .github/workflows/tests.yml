name: Tests

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: {}
  workflow_call: {}
  pull_request:
  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  integration:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.10'
          - '3.14'

    runs-on: ubuntu-latest
    steps:

      - name: Acquire sources
        uses: actions/checkout@v7

      - name: Install Microsoft ODBC (Linux)
        run: |
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install msodbcsql18 -y

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.1
        with:
          activate-environment: 'true'
          cache-suffix: ${{ matrix.python-version }}
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: |
          uv pip install --editable='.[full,develop,test]'

      - name: Set timezone
        uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: "Europe/Berlin"
          timezoneMacos: "Europe/Berlin"
          timezoneWindows: "European Standard Time"

      - name: Run linters and software tests
        run: poe check

      # https://github.com/codecov/codecov-action
      - name: Upload coverage results to Codecov
        uses: codecov/codecov-action@v7
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          fail_ci_if_error: true

  unit:
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'macos-latest'
          - 'windows-latest'
        python-version:
          - '3.10'
          - '3.14'

    runs-on: ${{ matrix.os }}
    steps:

      - name: Acquire sources
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.1
        with:
          activate-environment: 'true'
          cache-suffix: ${{ matrix.os }}-${{ matrix.python-version }}
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: |
          uv pip install --editable='.[develop,test]'

      - name: Set timezone
        uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: "Europe/Berlin"
          timezoneMacos: "Europe/Berlin"
          timezoneWindows: "European Standard Time"

      - name: Run Docker-free unit tests
        run: pytest -m "not integration" -k "not odbc" -p no:cacheprovider
