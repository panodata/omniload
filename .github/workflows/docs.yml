name: "Docs: Link checker"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: {}
  workflow_call: {}
  pull_request:
  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  tests:
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-latest'
        python-version:
          - '3.14'

    runs-on: ${{ matrix.os }}
    steps:

      - name: Acquire sources
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.1
        with:
          activate-environment: 'true'
          cache-suffix: ${{ matrix.python-version }}
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install requirements
        run: |
          uv pip install poethepoet -r docs/requirements.txt

      - name: Run link checker
        # Retry the whole check a few times: linkcheck_retries (in docs/conf.py) covers a
        # brief per-URL blip, but a host that is down for the length of one build only
        # recovers on a fresh attempt after a wait. Belt-and-suspenders against transient
        # external outages reddening an unrelated PR.
        run: |
          for attempt in 1 2 3; do
            poe docs-linkcheck && exit 0
            echo "::warning::linkcheck attempt ${attempt} failed; retrying in 30s"
            sleep 30
          done
          exit 1
