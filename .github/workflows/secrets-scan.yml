name: "Secrets scanner"

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
  pull_request:

jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Scan for secrets (gitleaks)
        run: docker run -v $PWD:/code -w /code ghcr.io/gitleaks/gitleaks:latest dir -v
