listener 1883
allow_anonymous true

# Persist sessions/messages so a durable subscriber (clean_session=false) that is offline
# between ingest runs still receives the messages published while it was disconnected — the
# ordering the mq-bridge MQTT test relies on. Flush after every change so nothing is lost.
persistence true
persistence_location /mosquitto/data/
autosave_on_changes true
autosave_interval 1

# Generous inflight/queue windows: mosquitto's defaults (20) are far smaller than the client's
# max_inflight, so it would advertise a tiny Receive Maximum and silently drop excess QoS-1
# messages. 0 = unlimited.
max_queued_messages 50000
max_inflight_messages 0
